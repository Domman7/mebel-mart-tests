[pytest]
# Default run options
addopts = -v -s --alluredir=reports/allure-results --clean-alluredir
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    filter_test: Tests for filtering functionality
    cart_test: Tests for cart functionality
    favorite_test: Tests for favorites functionality
    search_test: Tests for search functionality
    product_test: Tests for product details